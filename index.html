<script>(async()=>{try{if(!window.__SC_RELEASE||window.__SC_RELEASE.length!==10||window.__SC_RELEASE.some(x=>!x))throw new Error('Incomplete release payload');const b=atob(window.__SC_RELEASE.join('')),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);const ds=new DecompressionStream('gzip'),text=await new Response(new Blob([u]).stream().pipeThrough(ds)).text();document.open();document.write(text);document.close()}catch(e){document.body.innerHTML='<div class="loader">Unable to open the game. Please use a current Chrome, Edge, Firefox or Safari browser.<br><small>'+String(e.message||e)+'</small></div>';console.error(e)}})();</script></body></html>
