name: Apply native v1.8 atlas geometry

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/anime-art-integration-v18
          fetch-depth: 0
      - name: Use native character frame dimensions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          game=Path('src/game-1.js')
          text=game.read_text()
          if 'const SPRITE_FRAME_W = 96;' not in text or 'const SPRITE_FRAME_H = 128;' not in text:
              raise SystemExit('Legacy frame constants were not found')
          text=text.replace('const SPRITE_FRAME_W = 96;','const SPRITE_FRAME_W = 48;',1)
          text=text.replace('const SPRITE_FRAME_H = 128;','const SPRITE_FRAME_H = 64;',1)
          game.write_text(text)

          art=Path('src/anime-art-v18.js')
          text=art.read_text()
          start=text.find('// The permanent v1.8 atlas is four 432x256 character sheets')
          end=text.find('window.SAKURA_ANIME_ART=Object.freeze({')
          if start>=0 and end>start:
              text=text[:start]+text[end:]
          art.write_text(text)
          PY
          node --check src/game-1.js
          node --check src/anime-art-v18.js
          grep -q 'SPRITE_FRAME_W = 48' src/game-1.js
          grep -q 'SPRITE_FRAME_H = 64' src/game-1.js
          rm -f .github/workflows/clean-v18-atlas-backgrounds.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Use native v1.8 character atlas geometry'
          git push origin HEAD:agent/anime-art-integration-v18
