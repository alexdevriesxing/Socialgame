name: Fix v1.8 character rendering and dialogue QA

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/anime-art-integration-v18
          fetch-depth: 0
      - name: Correct native atlas sampling and asynchronous dialogue settling
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          art=Path('src/anime-art-v18.js')
          text=art.read_text()
          marker="window.SAKURA_ANIME_ART=Object.freeze({"
          renderer="""
          // The permanent v1.8 atlas is four 432x256 character sheets, each with 9x4 frames.
          // Sample it at its native 48x64 frame geometry to avoid scaling entire sheet quadrants as sprites.
          drawCharacter=function(name,frameColumn,directionRow,x,y,width=64,height=86){
            const img=images.character_atlas,index=CHARACTER_INDEX[name];
            if(!img||index===undefined)return;
            const frameW=48,frameH=64,sheetW=frameW*9,sheetH=frameH*4;
            const sheetX=(index%4)*sheetW,sheetY=Math.floor(index/4)*sheetH;
            ctx.drawImage(img,sheetX+frameColumn*frameW,sheetY+directionRow*frameH,frameW,frameH,x,y,width,height);
          };
          """
          if renderer.strip() not in text:
              if marker not in text: raise SystemExit('Anime-art insertion marker missing')
              text=text.replace(marker,renderer+'\n'+marker,1)
          art.write_text(text)

          test=Path('tests/browser-production-smoke.mjs')
          text=test.read_text()
          old="async function clearDialogues(page){for(let cycle=0;cycle<12;cycle++){for(let press=0;press<8;press++){if(!await page.evaluate(()=>Boolean(game.dialogue)))break;await page.keyboard.press('Space');await page.waitForTimeout(70);}if(await page.evaluate(()=>!game.dialogue))return;await page.waitForTimeout(120);}throw new Error('Opening dialogue sequence did not settle.');}"
          new="async function clearDialogues(page){let quiet=0;for(let cycle=0;cycle<60;cycle++){if(await page.evaluate(()=>Boolean(game.dialogue))){quiet=0;await page.keyboard.press('Space');await page.waitForTimeout(90);continue;}await page.waitForTimeout(180);if(await page.evaluate(()=>Boolean(game.dialogue))){quiet=0;continue;}quiet++;if(quiet>=3)return;}throw new Error('Opening dialogue sequence did not settle.');}"
          if old not in text: raise SystemExit('Dialogue helper pattern missing')
          test.write_text(text.replace(old,new,1))
          PY
          node --check src/anime-art-v18.js
          node --check tests/browser-production-smoke.mjs
          rm -f .github/workflows/fix-v18-character-render.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix native v1.8 sprite sampling and dialogue QA settling'
          git push origin HEAD:agent/anime-art-integration-v18
