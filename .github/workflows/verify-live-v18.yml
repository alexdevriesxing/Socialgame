name: Verify live v1.8 deployment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PROJECT_SECRET: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
  CLOUDFLARE_PROJECT_VARIABLE: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
  RELEASE_SHA: 05f49a704e452560cd96b174ed5cb6ed3f8a93dc

jobs:
  verify-live:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          ref: verify-live-v18
          fetch-depth: 0

      - name: Verify and package exact release
        shell: bash
        run: |
          set -euo pipefail
          node tests/verify-release.mjs
          rm -rf dist
          node <<'NODE'
          const fs=require('node:fs');
          const path=require('node:path');
          const manifest=JSON.parse(fs.readFileSync('build-manifest.json','utf8'));
          if(manifest.version!=='1.8.0')throw new Error(`Unexpected release ${manifest.version}`);
          for(const source of manifest.files){
            const destination=path.join('dist',source);
            fs.mkdirSync(path.dirname(destination),{recursive:true});
            fs.copyFileSync(source,destination);
          }
          NODE

      - name: Resolve Cloudflare project
        id: cloudflare
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo 'Missing CLOUDFLARE_API_TOKEN' >&2; exit 1; }
          account_id="${CLOUDFLARE_ACCOUNT_ID_SECRET:-}"
          if [ -z "$account_id" ]; then
            accounts=$(curl --fail --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H 'Content-Type: application/json' 'https://api.cloudflare.com/client/v4/accounts?per_page=50')
            account_id=$(printf '%s' "$accounts" | jq -r 'if .success then .result[0].id // empty else empty end')
          fi
          test -n "$account_id"
          projects=$(curl --fail --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H 'Content-Type: application/json' "https://api.cloudflare.com/client/v4/accounts/$account_id/pages/projects?per_page=100")
          printf '%s' "$projects" | jq -e '.success == true' >/dev/null
          project="${CLOUDFLARE_PROJECT_VARIABLE:-${CLOUDFLARE_PROJECT_SECRET:-}}"
          if [ -z "$project" ]; then project=$(printf '%s' "$projects" | jq -r '[.result[] | select(((.source.config.repo_name // "") | ascii_downcase) == "socialgame")] | first | .name // empty'); fi
          if [ -z "$project" ]; then project=$(printf '%s' "$projects" | jq -r '[.result[] | select((.name | ascii_downcase | test("sakura|socialgame")))] | first | .name // empty'); fi
          if [ -z "$project" ]; then project='sakura-crest-social-summit'; fi
          echo "account_id=$account_id" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Ensure exact commit is deployed to production
        id: deploy
        shell: bash
        env:
          ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
          PROJECT_NAME: ${{ steps.cloudflare.outputs.project }}
        run: |
          set -euo pipefail
          deployments=$(curl --fail --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H 'Content-Type: application/json' "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments?per_page=20")
          existing=$(printf '%s' "$deployments" | jq -r --arg sha "$RELEASE_SHA" '[.result[] | select(.deployment_trigger.metadata.commit_hash == $sha and .latest_stage.status == "success")] | first | .id // empty')
          if [ -z "$existing" ]; then
            export CLOUDFLARE_ACCOUNT_ID="$ACCOUNT_ID"
            npx --yes wrangler@4 pages deploy dist --project-name "$PROJECT_NAME" --branch main --commit-hash "$RELEASE_SHA" --commit-message 'Sakura Crest v1.8 verified production release'
          fi
          for attempt in $(seq 1 20); do
            deployments=$(curl --fail --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H 'Content-Type: application/json' "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments?per_page=20")
            deployment_url=$(printf '%s' "$deployments" | jq -r --arg sha "$RELEASE_SHA" '[.result[] | select(.deployment_trigger.metadata.commit_hash == $sha and .latest_stage.status == "success")] | first | .url // empty')
            [ -n "$deployment_url" ] && break
            sleep 6
          done
          test -n "$deployment_url"
          project_json=$(curl --fail --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H 'Content-Type: application/json' "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME")
          subdomain=$(printf '%s' "$project_json" | jq -r '.result.subdomain // empty')
          if [ -n "$subdomain" ]; then live_url="https://$subdomain"; else live_url="$deployment_url"; fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "live_url=$live_url" >> "$GITHUB_OUTPUT"

      - name: Validate live HTML and permanent anime assets
        shell: bash
        env:
          LIVE_URL: ${{ steps.deploy.outputs.live_url }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
          PROJECT_NAME: ${{ steps.cloudflare.outputs.project }}
        run: |
          set -euo pipefail
          html=$(curl --fail --silent --show-error --retry 5 --retry-delay 3 "$LIVE_URL/?verify=$RELEASE_SHA")
          printf '%s' "$html" | grep -q 'Sakura Crest'
          printf '%s' "$html" | grep -q '1.8.0'
          manifest=$(curl --fail --silent --show-error --retry 5 --retry-delay 3 "$LIVE_URL/assets/anime/manifest.json?verify=$RELEASE_SHA")
          printf '%s' "$manifest" | jq -e '.version == "1.8.0" and .proceduralFallbacks == false and .externalRuntimeDependency == false and .assets["characters.webp"].transparentPixelRatio > 0.9' >/dev/null
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$LIVE_URL/assets/anime/keyart.webp?verify=$RELEASE_SHA" -o /tmp/keyart.webp
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$LIVE_URL/assets/anime/campus.webp?verify=$RELEASE_SHA" -o /tmp/campus.webp
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$LIVE_URL/assets/anime/characters.webp?verify=$RELEASE_SHA" -o /tmp/characters.webp
          test $(stat -c%s /tmp/keyart.webp) -gt 100000
          test $(stat -c%s /tmp/campus.webp) -gt 600000
          test $(stat -c%s /tmp/characters.webp) -gt 1000000
          cat > live-v18-verification.json <<JSON
          {
            "verified": true,
            "release": "1.8.0",
            "commit": "$RELEASE_SHA",
            "project": "$PROJECT_NAME",
            "liveUrl": "$LIVE_URL",
            "deploymentUrl": "$DEPLOYMENT_URL",
            "htmlContainsTitle": true,
            "htmlContainsRelease": true,
            "animeManifestValid": true,
            "keyartBytes": $(stat -c%s /tmp/keyart.webp),
            "campusBytes": $(stat -c%s /tmp/campus.webp),
            "charactersBytes": $(stat -c%s /tmp/characters.webp)
          }
          JSON
          cat live-v18-verification.json

      - name: Preserve verification result
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/verify-live-v18.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record verified live v1.8 deployment'
          git push origin HEAD:verify-live-v18
