name: Verify live v1.8 deployment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PROJECT_SECRET: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
  CLOUDFLARE_PROJECT_VARIABLE: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
  RELEASE_SHA: 05f49a704e452560cd96b174ed5cb6ed3f8a93dc

jobs:
  verify-live:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: verify-live-v18
          fetch-depth: 0

      - name: Package exact release
        shell: bash
        run: |
          set -euo pipefail
          node tests/verify-release.mjs
          rm -rf dist
          node <<'NODE'
          const fs=require('node:fs'),path=require('node:path');
          const manifest=JSON.parse(fs.readFileSync('build-manifest.json','utf8'));
          if(manifest.version!=='1.8.0')throw new Error(`Unexpected release ${manifest.version}`);
          for(const source of manifest.files){const destination=path.join('dist',source);fs.mkdirSync(path.dirname(destination),{recursive:true});fs.copyFileSync(source,destination);}
          NODE

      - name: Resolve project with Wrangler
        id: cloudflare
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo 'Missing CLOUDFLARE_API_TOKEN' >&2; exit 1; }
          account_id="${CLOUDFLARE_ACCOUNT_ID_SECRET:-}"
          npx --yes wrangler@4 whoami > /tmp/whoami.txt
          cat /tmp/whoami.txt
          if [ -z "$account_id" ]; then account_id=$(grep -Eo '[0-9a-fA-F]{32}' /tmp/whoami.txt | head -n1 || true); fi
          if [ -n "$account_id" ]; then export CLOUDFLARE_ACCOUNT_ID="$account_id"; fi
          npx --yes wrangler@4 pages project list --json > /tmp/projects.json
          cat /tmp/projects.json
          project="${CLOUDFLARE_PROJECT_VARIABLE:-${CLOUDFLARE_PROJECT_SECRET:-}}"
          if [ -z "$project" ]; then
            project=$(jq -r 'if type=="array" then ([.[] | select((((.name // .Name // "") | ascii_downcase) | test("socialgame|sakura|crest")))] | first | (.name // .Name // empty)) else empty end' /tmp/projects.json 2>/dev/null || true)
          fi
          if [ -z "$project" ]; then project='sakura-crest-social-summit'; fi
          if ! jq -e --arg p "$project" 'type=="array" and any(.[]; ((.name // .Name // "") == $p))' /tmp/projects.json >/dev/null 2>&1; then
            npx --yes wrangler@4 pages project create "$project" --production-branch main
          fi
          echo "account_id=$account_id" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Deploy exact merged commit
        id: deploy
        shell: bash
        env:
          PROJECT_NAME: ${{ steps.cloudflare.outputs.project }}
          RESOLVED_ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
        run: |
          set -euo pipefail
          if [ -n "${RESOLVED_ACCOUNT_ID:-}" ]; then export CLOUDFLARE_ACCOUNT_ID="$RESOLVED_ACCOUNT_ID"; fi
          npx --yes wrangler@4 pages deploy dist --project-name "$PROJECT_NAME" --branch main --commit-hash "$RELEASE_SHA" --commit-message 'Sakura Crest v1.8 verified production release' 2>&1 | tee /tmp/deploy.txt
          deployment_url=$(grep -Eo 'https://[A-Za-z0-9.-]+\.pages\.dev' /tmp/deploy.txt | head -n1 || true)
          test -n "$deployment_url"
          canonical_url="https://$PROJECT_NAME.pages.dev"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "canonical_url=$canonical_url" >> "$GITHUB_OUTPUT"

      - name: Validate live HTML and permanent anime assets
        shell: bash
        env:
          CANONICAL_URL: ${{ steps.deploy.outputs.canonical_url }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
          PROJECT_NAME: ${{ steps.cloudflare.outputs.project }}
        run: |
          set -euo pipefail
          live_url="$CANONICAL_URL"
          if ! curl --fail --silent --show-error --retry 5 --retry-delay 3 "$live_url/?verify=$RELEASE_SHA" -o /tmp/index.html; then
            live_url="$DEPLOYMENT_URL"
            curl --fail --silent --show-error --retry 5 --retry-delay 3 "$live_url/?verify=$RELEASE_SHA" -o /tmp/index.html
          fi
          grep -q 'Sakura Crest' /tmp/index.html
          grep -q '1.8.0' /tmp/index.html
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$live_url/assets/anime/manifest.json?verify=$RELEASE_SHA" -o /tmp/manifest.json
          jq -e '.version == "1.8.0" and .proceduralFallbacks == false and .externalRuntimeDependency == false and .assets["characters.webp"].transparentPixelRatio > 0.9' /tmp/manifest.json >/dev/null
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$live_url/assets/anime/keyart.webp?verify=$RELEASE_SHA" -o /tmp/keyart.webp
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$live_url/assets/anime/campus.webp?verify=$RELEASE_SHA" -o /tmp/campus.webp
          curl --fail --silent --show-error --retry 5 --retry-delay 3 "$live_url/assets/anime/characters.webp?verify=$RELEASE_SHA" -o /tmp/characters.webp
          test $(stat -c%s /tmp/keyart.webp) -gt 100000
          test $(stat -c%s /tmp/campus.webp) -gt 600000
          test $(stat -c%s /tmp/characters.webp) -gt 1000000
          cat > live-v18-verification.json <<JSON
          {
            "verified": true,
            "release": "1.8.0",
            "commit": "$RELEASE_SHA",
            "project": "$PROJECT_NAME",
            "liveUrl": "$live_url",
            "deploymentUrl": "$DEPLOYMENT_URL",
            "htmlContainsTitle": true,
            "htmlContainsRelease": true,
            "animeManifestValid": true,
            "keyartBytes": $(stat -c%s /tmp/keyart.webp),
            "campusBytes": $(stat -c%s /tmp/campus.webp),
            "charactersBytes": $(stat -c%s /tmp/characters.webp)
          }
          JSON
          cat live-v18-verification.json

      - name: Preserve verification result
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/verify-live-v18.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record verified live v1.8 deployment'
          git push origin HEAD:verify-live-v18
