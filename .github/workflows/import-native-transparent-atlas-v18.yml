name: Diagnose native Canva asset v1.8

on:
  pull_request:
    branches:
      - agent/anime-art-integration-v18

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: asset-transfer-v18-final-clean
          fetch-depth: 0
      - run: python3 -m pip install --quiet pillow
      - name: Inspect native Canva asset rendition
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            'https://media.canva.com/v2/image-resize/format:PNG/height:1024/quality:100/uri:ifs%3A%2F%2FM%2F7e2c4bf8-4cbf-468f-b70b-6921ccdb4382/watermark:F/width:1728?csig=AAAAAAAAAAAAAAAAAAAAAFv5ut6DhVjOdQ13gf1_TLYtnXCgb0WBed3UOFmPcSCP&exp=1784338475&osig=AAAAAAAAAAAAAAAAAAAAAO0yYb5WSeNTqet8vkn5lyyNbOG0hH-DvHpweCBxnt5A&signer=media-rpc&x-canva-quality=thumbnail' \
            --output /tmp/characters-source.png
          python3 - <<'PY'
          from PIL import Image, ImageStat
          from pathlib import Path
          import hashlib
          path=Path('/tmp/characters-source.png')
          raw=Image.open(path)
          rgba=raw.convert('RGBA')
          alpha=rgba.getchannel('A')
          hist=alpha.histogram()
          total=rgba.width*rgba.height
          transparent=sum(hist[:8])/total
          partial=sum(hist[8:248])/total
          opaque=sum(hist[248:])/total
          text='\n'.join([
            f'bytes={path.stat().st_size}',
            f'sha256={hashlib.sha256(path.read_bytes()).hexdigest()}',
            f'format={raw.format}',
            f'mode={raw.mode}',
            f'size={raw.size}',
            f'transparent_ratio={transparent:.9f}',
            f'partial_alpha_ratio={partial:.9f}',
            f'opaque_ratio={opaque:.9f}',
            f'alpha_extrema={alpha.getextrema()}',
            f'rgb_variance={ImageStat.Stat(rgba.convert("RGB")).var}'
          ])+'\n'
          Path('debug-native-atlas.txt').write_text(text,encoding='utf-8')
          print(text)
          PY
      - name: Preserve diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f debug-native-atlas.txt
          git commit -m 'Capture native Canva asset diagnostics' || exit 0
          git push origin HEAD:asset-transfer-v18-final-clean
