name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_PROJECT_SECRET: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
  CLOUDFLARE_PROJECT_VARIABLE: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout production commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify v1.8 production artifact
        run: node tests/verify-release.mjs

      - name: Build exact Pages upload directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const manifest = JSON.parse(fs.readFileSync('build-manifest.json', 'utf8'));
          if (manifest.version !== '1.8.0') throw new Error(`Refusing to deploy release ${manifest.version}.`);
          for (const source of manifest.files) {
            const destination = path.join('dist', source);
            fs.mkdirSync(path.dirname(destination), { recursive: true });
            fs.copyFileSync(source, destination);
          }
          console.log(`Prepared ${manifest.files.length} files for Cloudflare Pages.`);
          NODE
          test -s dist/index.html
          test -s dist/assets/anime/keyart.webp
          test -s dist/assets/anime/campus.webp
          test -s dist/assets/anime/characters.webp
          test -s dist/_headers
          test -s dist/_redirects

      - name: Discover Cloudflare account and Pages project
        id: cloudflare
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo 'CLOUDFLARE_API_TOKEN is not configured in GitHub Actions secrets.' >&2
            exit 1
          fi

          account_id="${CLOUDFLARE_ACCOUNT_ID_SECRET:-}"
          if [ -z "$account_id" ]; then
            accounts_json=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H 'Content-Type: application/json' \
              'https://api.cloudflare.com/client/v4/accounts?per_page=50')
            account_id=$(printf '%s' "$accounts_json" | jq -r 'if .success then .result[0].id // empty else empty end')
          fi
          if [ -z "$account_id" ]; then
            echo 'No Cloudflare account could be resolved from the configured token.' >&2
            exit 1
          fi

          projects_json=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H 'Content-Type: application/json' \
            "https://api.cloudflare.com/client/v4/accounts/$account_id/pages/projects?per_page=100")
          printf '%s' "$projects_json" | jq -e '.success == true' >/dev/null

          project="${CLOUDFLARE_PROJECT_VARIABLE:-${CLOUDFLARE_PROJECT_SECRET:-}}"
          if [ -z "$project" ]; then
            project=$(printf '%s' "$projects_json" | jq -r '
              [.result[] | select(((.source.config.repo_name // "") | ascii_downcase) == "socialgame")] | first | .name // empty')
          fi
          if [ -z "$project" ]; then
            project=$(printf '%s' "$projects_json" | jq -r '
              [.result[] | select((.name | ascii_downcase | test("sakura|socialgame")))] | first | .name // empty')
          fi
          if [ -z "$project" ]; then
            project='sakura-crest-social-summit'
            create_json=$(curl --fail --silent --show-error \
              -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H 'Content-Type: application/json' \
              --data "{\"name\":\"$project\",\"production_branch\":\"main\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$account_id/pages/projects")
            printf '%s' "$create_json" | jq -e '.success == true' >/dev/null
          fi

          echo "account_id=$account_id" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "Resolved Cloudflare Pages project: $project" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy production release
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
          PROJECT_NAME: ${{ steps.cloudflare.outputs.project }}
        run: |
          set -euo pipefail
          npx --yes wrangler@4 pages deploy dist \
            --project-name "$PROJECT_NAME" \
            --branch main \
            --commit-hash "$GITHUB_SHA" \
            --commit-message "Sakura Crest v1.8 production release"

      - name: Verify Cloudflare recorded the production deployment
        shell: bash
        env:
          ACCOUNT_ID: ${{ steps.cloudflare.outputs.account_id }}
          PROJECT_NAME: ${{ steps.cloudflare.outputs.project }}
        run: |
          set -euo pipefail
          deployments=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H 'Content-Type: application/json' \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments?per_page=10")
          printf '%s' "$deployments" | jq -e --arg sha "$GITHUB_SHA" '
            .success == true and any(.result[]; .deployment_trigger.metadata.commit_hash == $sha and .latest_stage.status == "success")' >/dev/null
          production_url=$(printf '%s' "$deployments" | jq -r --arg sha "$GITHUB_SHA" '
            [.result[] | select(.deployment_trigger.metadata.commit_hash == $sha and .latest_stage.status == "success")] | first | .url // empty')
          echo "Cloudflare production deployment succeeded: $production_url" >> "$GITHUB_STEP_SUMMARY"
          printf 'deployment_url=%s\n' "$production_url"
