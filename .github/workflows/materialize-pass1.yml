name: Materialize Pass 1 production source

on:
  push:
    branches:
      - agent/pass-1-production-source
    paths:
      - .github/workflows/materialize-pass1.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Pass 1 branch
        uses: actions/checkout@v4
        with:
          ref: agent/pass-1-production-source
          fetch-depth: 0

      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .pass1/chunk-* | base64 --decode > /tmp/pass1-final.tar.gz
          echo "f97877d5a3175e66faeb0b032057b8ce67a86e4653dc65c378de4c5da688c81f  /tmp/pass1-final.tar.gz" | sha256sum --check -
          mkdir -p /tmp/pass1-source
          tar -xzf /tmp/pass1-final.tar.gz -C /tmp/pass1-source

      - name: Replace compressed prototype with canonical source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/pass1-source/. .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pillow
          npm ci

      - name: Validate source and reproducible release
        run: npm run check

      - name: Commit canonical production source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pass1
          rm -f .github/workflows/materialize-pass1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace compressed prototype with production source"
          git push origin HEAD:agent/pass-1-production-source
