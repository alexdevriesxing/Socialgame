name: Materialize Pass 1 canonical source

on:
  push:
    branches:
      - agent/pass-1-production-source
    paths:
      - '.pass1/**'
      - '.github/workflows/materialize-pass1.yml'

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out Pass 1 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .pass1/pass1-source-* | base64 --decode > /tmp/pass1-source.tar.gz
          echo "088928776299c960e76d46057b9d083fd51f68ac2fb7bb767e52d43ed54fd5b5  /tmp/pass1-source.tar.gz" | sha256sum --check -

      - name: Materialize readable production source
        shell: bash
        run: |
          set -euo pipefail
          rm -f part-*.js release-*.js
          rm -rf assets src scripts tests tools dist
          tar -xzf /tmp/pass1-source.tar.gz
          python3 -m pip install --disable-pip-version-check pillow
          python3 tools/generate_assets.py

      - name: Install and validate
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run check

      - name: Commit canonical source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pass1 .github/workflows/materialize-pass1.yml dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Materialize Pass 1 canonical production source"
          git push
