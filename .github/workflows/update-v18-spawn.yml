name: Update v1.8 spawn point

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/anime-art-integration-v18
          fetch-depth: 0
      - name: Update the hallway start position
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('src/anime-campus-v18.js')
          text=path.read_text()
          old='hallway:[680,520]'
          new='hallway:[680,600]'
          if old not in text:
              raise SystemExit('Expected hallway spawn was not found')
          path.write_text(text.replace(old,new,1))
          PY
          rm .github/workflows/update-v18-spawn.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Move the hallway start into the clear corridor'
          git push origin HEAD:agent/anime-art-integration-v18
