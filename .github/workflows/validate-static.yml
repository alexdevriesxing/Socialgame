name: Validate static game

on:
  push:
    branches:
      - agent/anime-campaign-pass
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Diagnose referenced scripts
        shell: bash
        run: |
          set -u
          : > syntax-diagnostic.txt
          mapfile -t scripts < <(grep -oP '<script src="\K[^"]+' index.html)
          if [ "${#scripts[@]}" -lt 30 ]; then
            echo "Expected at least 30 referenced scripts; found ${#scripts[@]}." > syntax-diagnostic.txt
            exit 0
          fi
          for script in "${scripts[@]}"; do
            if [ ! -f "$script" ]; then
              echo "MISSING_FILE=$script" > syntax-diagnostic.txt
              break
            fi
            if ! output=$(node --check "$script" 2>&1); then
              {
                echo "SYNTAX_FAILURE=$script"
                printf '%s\n' "$output"
              } > syntax-diagnostic.txt
              break
            fi
          done
          if [ ! -s syntax-diagnostic.txt ]; then
            rm syntax-diagnostic.txt
            echo "Checked ${#scripts[@]} referenced scripts."
          fi

      - name: Upload syntax diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syntax-diagnostic
          path: syntax-diagnostic.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Fail on syntax diagnostics
        shell: bash
        run: |
          if [ -f syntax-diagnostic.txt ]; then
            cat syntax-diagnostic.txt
            exit 1
          fi

      - name: Runtime smoke test
        run: node tests/remote-static-smoke.mjs

      - name: Static HTTP verification
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 > /tmp/sakura-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for attempt in {1..20}; do
            curl -fsS http://127.0.0.1:4173/index.html >/dev/null && break
            sleep 0.25
          done
          mapfile -t scripts < <(grep -oP '<script src="\K[^"]+' index.html)
          for script in "${scripts[@]}"; do
            curl -fsS "http://127.0.0.1:4173/$script" >/dev/null
          done
          curl -fsS http://127.0.0.1:4173/styles.css >/dev/null
          curl -fsS http://127.0.0.1:4173/build-manifest.json >/dev/null
          echo "HTTP-verified index, CSS, manifest and ${#scripts[@]} scripts."

      - name: Assemble Cloudflare release
        shell: bash
        run: |
          set -euo pipefail
          rm -rf cloudflare-release
          mkdir -p cloudflare-release/assets
          cp index.html styles.css manifest.webmanifest _headers build-manifest.json LICENSE README.md cloudflare-release/
          cp assets/favicon.svg cloudflare-release/assets/
          mapfile -t scripts < <(grep -oP '<script src="\K[^"]+' index.html)
          for script in "${scripts[@]}"; do
            mkdir -p "cloudflare-release/$(dirname "$script")"
            cp "$script" "cloudflare-release/$script"
          done
          (cd cloudflare-release && zip -qr ../Sakura-Crest-Rivalries-Campus-v0.7-cloudflare.zip .)
          sha256sum Sakura-Crest-Rivalries-Campus-v0.7-cloudflare.zip | tee cloudflare-release-sha256.txt

      - name: Upload Cloudflare release
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-v07
          path: |
            Sakura-Crest-Rivalries-Campus-v0.7-cloudflare.zip
            cloudflare-release-sha256.txt
          retention-days: 7
