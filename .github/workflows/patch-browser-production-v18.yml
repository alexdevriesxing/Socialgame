name: Patch browser production QA for v1.8

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/anime-art-integration-v18
          fetch-depth: 0
      - name: Update browser release assertions
        shell: bash
        run: |
          set -euo pipefail
          sed -i \
            -e "s/'1\.7\.0'/'1.8.0'/g" \
            -e 's/v1\.7 title/v1.8 title/g' \
            -e 's/New-game v1\.7/New-game v1.8/g' \
            -e 's/Pass 9 browser QA passed/v1.8 browser QA passed/g' \
            tests/browser-production-smoke.mjs
          grep -q "release?.version!=='1.8.0'" tests/browser-production-smoke.mjs
          ! grep -q "1.7.0" tests/browser-production-smoke.mjs
          rm -f .github/workflows/patch-browser-production-v18.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Update Chromium production QA for v1.8'
          git push origin HEAD:agent/anime-art-integration-v18
