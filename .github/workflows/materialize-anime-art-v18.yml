name: Materialize anime art v1.8

on:
  push:
    branches:
      - asset-transfer-v18

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout transfer branch
        uses: actions/checkout@v4
        with:
          ref: asset-transfer-v18
          fetch-depth: 0

      - name: Install image tooling
        run: python3 -m pip install --quiet pillow

      - name: Reconstruct permanent commercial artwork
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/anime
          cat > /tmp/reconstruct_art.py <<'PY'
          from PIL import Image, ImageStat
          from io import BytesIO
          from pathlib import Path
          from urllib.parse import quote
          from urllib.request import Request, urlopen
          import hashlib, json

          RESPONSE_DAY = 'Wed, 15 Jul 2026 '
          def signed_url(tail, design, stamp, expires, signature, clock):
              credential = f'AKIAQYCGKMUHXSTDDERN/{stamp[:8]}/us-east-1/s3/aws4_request'
              params = [
                  ('X-Amz-Algorithm','AWS4-HMAC-SHA256'),
                  ('X-Amz-Credential',credential),
                  ('X-Amz-Date',stamp),
                  ('X-Amz-Expires',expires),
                  ('X-Amz-Signature',signature),
                  ('X-Amz-SignedHeaders','host'),
                  ('response-expires',RESPONSE_DAY + clock + ' GMT'),
              ]
              query = '&'.join(f'{quote(k,safe="")}={quote(v,safe="")}' for k,v in params)
              return f'https://s3.amazonaws.com/document-export.canva.com/{tail}/{design}/1/thumbnail/0001.png?{query}'

          def fetch(spec):
              name, tail, design, stamp, expires, signature, clock = spec
              url = signed_url(tail, design, stamp, expires, signature, clock)
              request = Request(url, headers={'User-Agent':'Sakura-Crest-GitHub-Asset-Builder/1.8'})
              with urlopen(request, timeout=90) as response:
                  data = response.read()
              image = Image.open(BytesIO(data)).convert('RGBA')
              if min(ImageStat.Stat(image.convert('RGB')).var) < 10:
                  raise RuntimeError(f'{name}: downloaded image has insufficient visual variance')
              print(name, image.size, len(data))
              return image

          campus_specs = [
              ('campus-00','35Uak','DAHPet35Uak','20260714T202917Z','83606','4d79c09bcbc801ccdfd2e76a1fee57ca7e90c8be216d5db28778423ccce74d93','19:42:43'),
              ('campus-01','AOpEY','DAHPerAOpEY','20260714T231745Z','73551','a1937762c7a2905aebe63fe506ecabb3757d7d42725867f455d05c69f24d915f','19:43:36'),
              ('campus-02','8qArA','DAHPev8qArA','20260715T095728Z','35205','269d84224c005e83dc6ec1fa72212a8cff004f66c92381b9b2ae62965041b5b4','19:44:13'),
              ('campus-03','wqNIc','DAHPeiwqNIc','20260715T084510Z','39578','3b9ae395c454387105ef3817385c79bc41e22969d8405bd5da71be8e3945fbaf','19:44:48'),
              ('campus-04','g0dOM','DAHPeug0dOM','20260715T041420Z','55865','57a4d179e7bc553df46e292c98805960ec82895260cf42fb8f9e2b1300953dbf','19:45:25'),
              ('campus-05','wsGbA','DAHPekwsGbA','20260714T224204Z','75844','ef2b456948fa080ffe38562900eea9f326a255e2cb093fedd9412d0fe1e55c44','19:46:08'),
          ]
          keyart_specs = [
              ('keyart-00','3sEwM','DAHPev3sEwM','20260715T081523Z','41484','93dec489b31d69899669bfd00c614ca06ef30835020400353ddad32f450ac18b','19:46:47'),
              ('keyart-01','iU8Y4','DAHPesiU8Y4','20260714T191033Z','88623','8919123e3eb2478bcc458962c64c9b5e6642f469c2346ff94d06d00ccbe76d4e','19:47:36'),
              ('keyart-10','IdN2g','DAHPesIdN2g','20260715T133645Z','22306','84616b8c90f610e3298863df648d64f9ea66fbca3731f0c10e79818ba8a7d7de','19:48:31'),
              ('keyart-11','LEbFE','DAHPetLEbFE','20260715T064550Z','47031','0779d078bc6bfeb51d9564fe353d776ccd270058964e3facbc0563bbe8aed450','19:49:41'),
          ]
          character_specs = [
              ('character-00','pgdsE','DAHPeopgdsE','20260714T204216Z','83293','404f64f430e132ea7814290fb4b9d0608a77cd46d9447e57d678ae509c81cc59','19:50:29'),
              ('character-01','2sc3U','DAHPep2sc3U','20260714T224145Z','76167','1788880730bedf35339ac2c6f9f33595e4669a3f92e51da6e2da4da6d1aa8d64','19:51:12'),
              ('character-02','ObO_U','DAHPegObO_U','20260715T181223Z','5976','035396049f1a3d49a8be15fa1a34ee0694088f73408bd148b28b69c5dae5b6e9','19:51:59'),
              ('character-03','jSDJQ','DAHPerjSDJQ','20260715T170148Z','10249','94471b559ff9328250b097f3feb6a5922f2e990da6d354385a0aeda28afdd96e','19:52:37'),
              ('character-10','rsbS8','DAHPemrsbS8','20260715T025737Z','60942','852683f50a5db13bf99d66a39d154d7e3fd33f080cb3d150d0b9278013bdcfa9','19:53:19'),
              ('character-11','tVkTc','DAHPeltVkTc','20260714T214954Z','79444','1004b6fefb610081a3e3d964aa6b67d00b3b3e3fbf6d0fd62ac6c219b0f7a483','19:53:58'),
              ('character-12','R-YLg','DAHPesR-YLg','20260715T114318Z','29475','c444120c2a9f26a56a04516ab1934e54c17e3a02aad5ae728630492dc273ff4e','19:54:33'),
              ('character-13','zJo3s','DAHPevzJo3s','20260715T002529Z','70182','f082e3ff8f5f7f76b4c3f1b52fa5caa459f3bd39ab6e16db0f416fb36a5a57ff','19:55:11'),
              ('character-20','JOFzk','DAHPekJOFzk','20260714T224536Z','76211','8db31db1ff0b093f47a5d595d76647c0babc1b7997f81b755e0f1ef9a3cdb669','19:55:47'),
              ('character-21','HwHFU','DAHPepHwHFU','20260715T015608Z','64824','187d94e7a3cf8a047749d7d6dcc2cc8982c3304ae8b9dd9c74e31e2d824354a9','19:56:32'),
              ('character-22','Os_Bg','DAHPejOs_Bg','20260715T002922Z','70070','b63f01a6994d637504558acc8a35fd4eb112eb2fe0581955825cff82d1cd721e','19:57:12'),
              ('character-23','FR2yM','DAHPehFR2yM','20260715T092329Z','38063','9cf05fdc76956db25810206b7071e59ae88b2b27c51e32b2ad9d4c0f873a08d7','19:57:52'),
              ('character-30','pJZLg','DAHPenpJZLg','20260715T082751Z','41434','f9d08ee4d3804d01e03db0751c8d6909e602e035a39d10fb717bae3f19752c8f','19:58:25'),
              ('character-31','USKxM','DAHPetUSKxM','20260715T021432Z','63870','b2924128c80938f114bd0a653f223fd9492cf0151a58cb0322c1c3be463bea66','19:59:02'),
              ('character-32','6U9GM','DAHPel6U9GM','20260715T180713Z','6759','10178b7ab7123aa203091e7346a437b1c23b6b637235b2123d94a1b975c05e64','19:59:52'),
              ('character-33','k-hg0','DAHPe7k-hg0','20260715T062646Z','48880','d57d553d1acbc0e72c338a1b2a0bc876410864441349d14ca6170f33b42c6ad7','20:01:26'),
          ]
          object_spec = ('objects','zzMdQ','DAHPc0zzMdQ','20260714T230007Z','75851','e2032812ebc2011825842f334236b6560894c5f31bb5fb64056fe901cad1a39d','20:04:18')

          out = Path('assets/anime')
          keyart = Image.new('RGBA',(960,540))
          for index,spec in enumerate(keyart_specs):
              tile = fetch(spec).resize((480,270),Image.Resampling.LANCZOS)
              keyart.paste(tile,((index%2)*480,(index//2)*270))

          campus = Image.new('RGBA',(3072,576))
          for index,spec in enumerate(campus_specs):
              tile = fetch(spec).resize((512,576),Image.Resampling.LANCZOS)
              campus.paste(tile,(index*512,0))

          characters = Image.new('RGBA',(1728,1024))
          for index,spec in enumerate(character_specs):
              tile = fetch(spec).resize((432,256),Image.Resampling.LANCZOS)
              characters.paste(tile,((index%4)*432,(index//4)*256))

          objects = fetch(object_spec).resize((768,384),Image.Resampling.LANCZOS)

          portraits = Image.new('RGBA',(512,512),(0,0,0,0))
          for index in range(16):
              sheet_x=(index%4)*432; sheet_y=(index//4)*256
              frame=characters.crop((sheet_x+5*48,sheet_y,sheet_x+6*48,sheet_y+64))
              alpha=frame.getchannel('A').getbbox()
              if alpha:
                  frame=frame.crop(alpha)
              frame.thumbnail((112,120),Image.Resampling.LANCZOS)
              cell=Image.new('RGBA',(128,128),(0,0,0,0))
              cell.alpha_composite(frame,((128-frame.width)//2,128-frame.height))
              portraits.alpha_composite(cell,((index%4)*128,(index//4)*128))

          images={'keyart.webp':keyart,'campus.webp':campus,'characters.webp':characters,'portraits.webp':portraits,'objects.webp':objects}
          quality={'keyart.webp':88,'campus.webp':86,'characters.webp':88,'portraits.webp':90,'objects.webp':88}
          manifest={'version':'1.8.0','source':'original generated commercial anime artwork reconstructed from authenticated lossless tiles','proceduralFallbacks':False,'externalRuntimeDependency':False,'assets':{}}
          for name,image in images.items():
              path=out/name
              image.save(path,'WEBP',quality=quality[name],method=6)
              data=path.read_bytes()
              manifest['assets'][name]={'width':image.width,'height':image.height,'bytes':len(data),'sha256':hashlib.sha256(data).hexdigest()}
              print(name,image.size,len(data),manifest['assets'][name]['sha256'])
          (out/'manifest.json').write_text(json.dumps(manifest,indent=2)+'\n')
          PY
          python3 /tmp/reconstruct_art.py

      - name: Commit permanent artwork to v1.8 branch
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/materialize-anime-art-v18.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize commercial anime artwork v1.8"
          git push origin HEAD:agent/anime-art-integration-v18
