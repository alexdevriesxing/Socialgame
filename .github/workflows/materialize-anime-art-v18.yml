name: Materialize anime art v1.8

on:
  push:
    branches:
      - asset-transfer-v18

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ hashFiles('.asset-import/READY') != '' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout transfer branch
        uses: actions/checkout@v4
        with:
          ref: asset-transfer-v18
          fetch-depth: 0

      - name: Decode and verify permanent artwork
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/anime
          for asset in keyart campus characters portraits objects; do
            mapfile -t parts < <(find ".asset-import/$asset" -type f -name '*.part' | sort)
            test "${#parts[@]}" -gt 0
            cat "${parts[@]}" | base64 --decode > "assets/anime/$asset.webp"
          done

          echo '710731e1b48a58ff4d2a5c29b04ad3fd7260df09d33e8e66a70ece015fad93fe  assets/anime/keyart.webp' | sha256sum -c -
          echo '0d3453f0ea19154063a4c8675b5189433adf698013804eea035843b4a337b72e  assets/anime/campus.webp' | sha256sum -c -
          echo '3c5713c79c388f20d6f001f11d6b4dd994337979fc2b4f6d3f39ba0ad25e0044  assets/anime/characters.webp' | sha256sum -c -
          echo '3901a8bf2eac99a789ca04d73e6df5114ce732f0b94e126640c990aca249186d  assets/anime/portraits.webp' | sha256sum -c -
          echo '80b9c3d8251ad3bed44ad5aa3446ed852d6bf5fa7a3353e9dd8b20ee4d2c918d  assets/anime/objects.webp' | sha256sum -c -

          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          from PIL import Image
          expected = {
              'keyart.webp': (960, 540),
              'campus.webp': (3072, 576),
              'characters.webp': (1728, 1024),
              'portraits.webp': (512, 512),
              'objects.webp': (768, 384),
          }
          for name, size in expected.items():
              image = Image.open('assets/anime/' + name)
              image.load()
              if image.size != size:
                  raise SystemExit(f'{name}: {image.size} != {size}')
              print(name, image.size, image.mode)
          PY

          cat > assets/anime/manifest.json <<'JSON'
          {
            "version": "1.8.0",
            "source": "original generated commercial anime artwork",
            "proceduralFallbacks": false,
            "externalRuntimeDependency": false,
            "assets": {
              "keyart.webp": {"width": 960, "height": 540, "bytes": 89654, "sha256": "710731e1b48a58ff4d2a5c29b04ad3fd7260df09d33e8e66a70ece015fad93fe"},
              "campus.webp": {"width": 3072, "height": 576, "bytes": 294646, "sha256": "0d3453f0ea19154063a4c8675b5189433adf698013804eea035843b4a337b72e"},
              "characters.webp": {"width": 1728, "height": 1024, "bytes": 359956, "sha256": "3c5713c79c388f20d6f001f11d6b4dd994337979fc2b4f6d3f39ba0ad25e0044"},
              "portraits.webp": {"width": 512, "height": 512, "bytes": 26436, "sha256": "3901a8bf2eac99a789ca04d73e6df5114ce732f0b94e126640c990aca249186d"},
              "objects.webp": {"width": 768, "height": 384, "bytes": 48194, "sha256": "80b9c3d8251ad3bed44ad5aa3446ed852d6bf5fa7a3353e9dd8b20ee4d2c918d"}
            }
          }
          JSON

      - name: Commit clean permanent artwork to v1.8 branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .asset-import
          rm -f .github/workflows/materialize-anime-art-v18.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize commercial anime artwork v1.8"
          git push origin HEAD:agent/anime-art-integration-v18
