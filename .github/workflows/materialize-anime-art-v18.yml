name: Materialize anime art v1.8

on:
  push:
    branches:
      - asset-transfer-v18

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ hashFiles('.asset-import/READY') != '' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout transfer branch
        uses: actions/checkout@v4
        with:
          ref: asset-transfer-v18
          fetch-depth: 0

      - name: Decode and verify permanent artwork
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/anime
          for asset in keyart campus characters portraits objects; do
            mapfile -t parts < <(find ".asset-import/$asset" -type f -name '*.part' | sort)
            test "${#parts[@]}" -gt 0
            cat "${parts[@]}" | base64 --decode > "assets/anime/$asset.webp"
          done

          echo '303961396bb3ce1219206e2e670bc7863c096b20f8f33ed0fadd0926f69e05ae  assets/anime/keyart.webp' | sha256sum -c -
          echo '26500180d0094844a2c4ed6c35e2ac7ebb5cefc9bbcd8841eb9f07cfa97c7f88  assets/anime/campus.webp' | sha256sum -c -
          echo 'e6f0a0a4faba0f758608d9978a8c20d20af35a079a81a0ad5925d674293ef7ab  assets/anime/characters.webp' | sha256sum -c -
          echo '2ef69196f618ecfec78226be2f51aa76b409bcc04e251931d1ab58bb65326a0c  assets/anime/portraits.webp' | sha256sum -c -
          echo 'ad3578796e3f41f5e6f37f7f17a51aae601816adc6080b973e053aba74c196e2  assets/anime/objects.webp' | sha256sum -c -

          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          from PIL import Image
          expected = {
              'keyart.webp': (1280, 720),
              'campus.webp': (3072, 576),
              'characters.webp': (1728, 1024),
              'portraits.webp': (512, 512),
              'objects.webp': (768, 384),
          }
          for name, size in expected.items():
              image = Image.open('assets/anime/' + name)
              image.load()
              if image.size != size:
                  raise SystemExit(f'{name}: {image.size} != {size}')
              print(name, image.size, image.mode)
          PY

          cat > assets/anime/manifest.json <<'JSON'
          {
            "version": "1.8.0",
            "source": "original generated commercial anime artwork",
            "proceduralFallbacks": false,
            "externalRuntimeDependency": false,
            "assets": {
              "keyart.webp": {"width": 1280, "height": 720, "bytes": 164184, "sha256": "303961396bb3ce1219206e2e670bc7863c096b20f8f33ed0fadd0926f69e05ae"},
              "campus.webp": {"width": 3072, "height": 576, "bytes": 310592, "sha256": "26500180d0094844a2c4ed6c35e2ac7ebb5cefc9bbcd8841eb9f07cfa97c7f88"},
              "characters.webp": {"width": 1728, "height": 1024, "bytes": 413760, "sha256": "e6f0a0a4faba0f758608d9978a8c20d20af35a079a81a0ad5925d674293ef7ab"},
              "portraits.webp": {"width": 512, "height": 512, "bytes": 29464, "sha256": "2ef69196f618ecfec78226be2f51aa76b409bcc04e251931d1ab58bb65326a0c"},
              "objects.webp": {"width": 768, "height": 384, "bytes": 67058, "sha256": "ad3578796e3f41f5e6f37f7f17a51aae601816adc6080b973e053aba74c196e2"}
            }
          }
          JSON

      - name: Commit clean permanent artwork to v1.8 branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .asset-import
          rm -f .github/workflows/materialize-anime-art-v18.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize commercial anime artwork v1.8"
          git push origin HEAD:agent/anime-art-integration-v18
