name: Materialize anime art v1.8

on:
  push:
    branches:
      - asset-transfer-v18
  pull_request:
    branches:
      - agent/anime-art-integration-v18

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout transfer branch
        uses: actions/checkout@v4
        with:
          ref: asset-transfer-v18
          fetch-depth: 0

      - name: Install image tooling
        run: python3 -m pip install --quiet pillow

      - name: Reconstruct permanent commercial artwork
        run: python3 scripts/materialize_v18_art.py

      - name: Validate permanent asset inventory
        shell: bash
        run: |
          set -euo pipefail
          test -s assets/anime/keyart.webp
          test -s assets/anime/campus.webp
          test -s assets/anime/characters.webp
          test -s assets/anime/portraits.webp
          test -s assets/anime/objects.webp
          test -s assets/anime/manifest.json
          python3 - <<'PY'
          from PIL import Image
          expected={
            'keyart.webp':(960,540),
            'campus.webp':(4096,768),
            'characters.webp':(1728,1024),
            'portraits.webp':(512,512),
            'objects.webp':(1024,512),
          }
          for name,size in expected.items():
            image=Image.open('assets/anime/'+name)
            image.load()
            assert image.size==size,(name,image.size,size)
            print(name,image.size,image.mode)
          PY

      - name: Commit clean artwork to the v1.8 integration branch
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/materialize-anime-art-v18.yml
          rm -f .github/workflows/debug-anime-tile-v18.yml
          rm -f scripts/materialize_v18_art.py
          rm -rf debug-art
          rm -f docs/asset-transfer-v18-trigger.txt docs/asset-transfer-v18-trigger-2.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Materialize commercial anime artwork v1.8'
          git push origin HEAD:agent/anime-art-integration-v18
