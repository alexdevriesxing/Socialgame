name: Materialize transparent atlas v1.8

on:
  pull_request:
    branches:
      - agent/anime-art-integration-v18

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: asset-cleanup-v18
          fetch-depth: 0
      - run: python3 -m pip install --quiet pillow
      - name: Materialize frame transparency
        run: |
          python3 - <<'PY'
          from PIL import Image
          from collections import deque
          from pathlib import Path
          import hashlib,json
          path=Path('assets/anime/characters.webp')
          atlas=Image.open(path).convert('RGBA');atlas.load();assert atlas.size==(1728,1024)
          fw,fh=48,64
          def dark(px,limit):
            r,g,b,a=px;return a>0 and max(r,g,b)<=limit and max(r,g,b)-min(r,g,b)<=36
          for fy in range(0,atlas.height,fh):
            for fx in range(0,atlas.width,fw):
              frame=atlas.crop((fx,fy,fx+fw,fy+fh));pixels=frame.load();seen=set();q=deque()
              for x in range(fw):
                for y in (0,fh-1):
                  if dark(pixels[x,y],96) and (x,y) not in seen:seen.add((x,y));q.append((x,y))
              for y in range(fh):
                for x in (0,fw-1):
                  if dark(pixels[x,y],96) and (x,y) not in seen:seen.add((x,y));q.append((x,y))
              while q:
                x,y=q.popleft()
                for nx,ny in ((x-1,y),(x+1,y),(x,y-1),(x,y+1)):
                  if 0<=nx<fw and 0<=ny<fh and (nx,ny) not in seen and dark(pixels[nx,ny],86):seen.add((nx,ny));q.append((nx,ny))
              for x,y in seen:
                r,g,b,a=pixels[x,y];pixels[x,y]=(r,g,b,0)
              frontier={(nx,ny) for x,y in seen for nx,ny in ((x-1,y),(x+1,y),(x,y-1),(x,y+1)) if 0<=nx<fw and 0<=ny<fh and (nx,ny) not in seen}
              for x,y in frontier:
                r,g,b,a=pixels[x,y];peak=max(r,g,b);spread=peak-min(r,g,b)
                if a and peak<120 and spread<46:pixels[x,y]=(r,g,b,max(0,min(a,int((peak-36)/84*255))))
              atlas.paste(frame,(fx,fy))
          hist=atlas.getchannel('A').histogram();total=atlas.width*atlas.height
          transparent=sum(hist[:8])/total;partial=sum(hist[8:248])/total
          if transparent<=.02:raise SystemExit(f'no transparency generated: {transparent}')
          atlas.save(path,'WEBP',lossless=True,method=6,exact=True)
          data=path.read_bytes();digest=hashlib.sha256(data).hexdigest()
          mp=Path('assets/anime/manifest.json');manifest=json.loads(mp.read_text())
          manifest['source']='original commercial anime artwork with frame-edge-cleaned transparent character backgrounds';manifest['proceduralFallbacks']=False;manifest['externalRuntimeDependency']=False
          manifest['assets']['characters.webp']={'width':1728,'height':1024,'bytes':len(data),'sha256':digest,'transparentPixelRatio':round(transparent,6),'partialAlphaPixelRatio':round(partial,6)}
          mp.write_text(json.dumps(manifest,indent=2)+'\n');Path('atlas-materialization.txt').write_text(f'bytes={len(data)}\nsha256={digest}\ntransparent={transparent}\npartial={partial}\n')
          print(Path('atlas-materialization.txt').read_text())
          PY
      - name: Remove rejected compositor and update release files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          p=Path('index.html');p.write_text(p.read_text().replace('  <script src="src/anime-sprite-cleanup-v18.js"></script>\n',''))
          p=Path('build-manifest.json');d=json.loads(p.read_text());d['files']=[x for x in d['files'] if x!='src/anime-sprite-cleanup-v18.js'];p.write_text(json.dumps(d,indent=2)+'\n')
          p=Path('sw.js');p.write_text(p.read_text().replace("'sakura-crest-v1.8.0-sprite-cleanup'","'sakura-crest-v1.8.0-transparent-atlas'").replace("'./src/anime-sprite-cleanup-v18.js',",''))
          PY
          rm -f src/anime-sprite-cleanup-v18.js
          cat > tests/sprite-transparency-smoke.mjs <<'JS'
          import { chromium } from 'playwright';import { mkdir } from 'node:fs/promises';
          const baseURL=process.env.BASE_URL||'http://127.0.0.1:4173';await mkdir('test-results',{recursive:true});const browser=await chromium.launch({headless:true});
          try{const context=await browser.newContext({viewport:{width:1440,height:900},reducedMotion:'reduce'});const page=await context.newPage();const errors=[];page.on('pageerror',e=>errors.push(String(e)));page.on('console',m=>{if(m.type()==='error')errors.push(m.text())});page.on('requestfailed',r=>errors.push(`${r.url()} ${r.failure()?.errorText||''}`));await page.goto(baseURL,{waitUntil:'networkidle'});await page.waitForFunction(()=>document.getElementById('loading')?.classList.contains('hidden')&&game?.mode==='title',null,{timeout:25000});const atlas=await page.evaluate(()=>{const i=images.character_atlas,c=document.createElement('canvas');c.width=i.naturalWidth;c.height=i.naturalHeight;const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(i,0,0);const d=x.getImageData(0,0,c.width,c.height).data;let t=0;for(let n=3;n<d.length;n+=4)if(d[n]<8)t++;return{w:c.width,h:c.height,t:t/(d.length/4)}});if(atlas.w!==1728||atlas.h!==1024||atlas.t<.02)throw new Error(`atlas ${JSON.stringify(atlas)}`);const box=await page.locator('#game').boundingBox();await page.mouse.click(box.x+800/960*box.width,box.y+155/540*box.height);await page.locator('#creator:not(.hidden)').waitFor();await page.locator('#nameInput').fill('Sprite QA');await page.locator('#confirmName').click();await page.waitForFunction(()=>game.mode==='play');for(let n=0;n<70;n++){if(await page.evaluate(()=>!!game.dialogue)){await page.keyboard.press('Space');await page.waitForTimeout(80)}else break}await page.waitForTimeout(500);await page.screenshot({path:'test-results/sprite-transparency-desktop.png',fullPage:true});if(errors.length)throw new Error(errors.join('\n'));console.log('transparent atlas passed',atlas);await context.close()}finally{await browser.close()}
          JS
      - name: Commit corrected artwork
        run: |
          rm -f .github/workflows/materialize-transparent-atlas-v18.yml
          git config user.name 'github-actions[bot]';git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A;git commit -m 'Materialize transparent anime character frames';git push origin HEAD:asset-cleanup-v18
