name: Materialize transparent atlas v1.8

on:
  pull_request:
    branches:
      - agent/anime-art-integration-v18

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: asset-cleanup-v18
          fetch-depth: 0
      - run: python3 -m pip install --quiet pillow
      - name: Remove only frame-edge-connected backdrop pixels
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from PIL import Image
          from collections import deque
          from pathlib import Path
          import hashlib, json

          path=Path('assets/anime/characters.webp')
          atlas=Image.open(path).convert('RGBA')
          atlas.load()
          assert atlas.size==(1728,1024),atlas.size
          fw,fh=48,64

          def dark(pixel, limit=78):
              r,g,b,a=pixel
              return a>0 and max(r,g,b)<=limit and (max(r,g,b)-min(r,g,b))<=34

          for fy in range(0,atlas.height,fh):
              for fx in range(0,atlas.width,fw):
                  frame=atlas.crop((fx,fy,fx+fw,fy+fh))
                  pixels=frame.load()
                  seen=set(); queue=deque()
                  for x in range(fw):
                      for y in (0,fh-1):
                          if dark(pixels[x,y],92) and (x,y) not in seen:
                              seen.add((x,y));queue.append((x,y))
                  for y in range(fh):
                      for x in (0,fw-1):
                          if dark(pixels[x,y],92) and (x,y) not in seen:
                              seen.add((x,y));queue.append((x,y))
                  while queue:
                      x,y=queue.popleft()
                      for nx,ny in ((x-1,y),(x+1,y),(x,y-1),(x,y+1)):
                          if 0<=nx<fw and 0<=ny<fh and (nx,ny) not in seen and dark(pixels[nx,ny],84):
                              seen.add((nx,ny));queue.append((nx,ny))
                  for x,y in seen:
                      r,g,b,a=pixels[x,y]
                      pixels[x,y]=(r,g,b,0)
                  # Feather only backdrop antialiasing immediately adjacent to cleared pixels.
                  frontier=set()
                  for x,y in seen:
                      for nx,ny in ((x-1,y),(x+1,y),(x,y-1),(x,y+1)):
                          if 0<=nx<fw and 0<=ny<fh and (nx,ny) not in seen:
                              frontier.add((nx,ny))
                  for x,y in frontier:
                      r,g,b,a=pixels[x,y]
                      peak=max(r,g,b)
                      spread=peak-min(r,g,b)
                      if a and peak<118 and spread<44:
                          new_alpha=max(0,min(a,int((peak-38)/80*255)))
                          pixels[x,y]=(r,g,b,new_alpha)
                  atlas.alpha_composite(frame,(fx,fy))

          alpha=atlas.getchannel('A')
          histogram=alpha.histogram();total=atlas.width*atlas.height
          transparent=sum(histogram[:8])/total
          partial=sum(histogram[8:248])/total
          if not (.55<transparent<.94):
              raise SystemExit(f'Unexpected transparency ratio: {transparent}')
          # Every character block must retain substantial visible artwork.
          for row in range(4):
              for col in range(4):
                  block=atlas.crop((col*432,row*256,(col+1)*432,(row+1)*256))
                  opaque=sum(value>32 for value in block.getchannel('A').getdata())
                  if opaque<12000:
                      raise SystemExit(f'Character block {row},{col} lost artwork: {opaque}')
          atlas.save(path,'WEBP',lossless=True,method=6,exact=True)
          data=path.read_bytes();digest=hashlib.sha256(data).hexdigest()
          manifest_path=Path('assets/anime/manifest.json')
          manifest=json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['source']='original commercial anime artwork with frame-edge-cleaned transparent character backgrounds'
          manifest['proceduralFallbacks']=False
          manifest['externalRuntimeDependency']=False
          manifest['assets']['characters.webp']={
            'width':1728,'height':1024,'bytes':len(data),'sha256':digest,
            'transparentPixelRatio':round(transparent,6),'partialAlphaPixelRatio':round(partial,6)
          }
          manifest_path.write_text(json.dumps(manifest,indent=2)+'\n',encoding='utf-8')
          print('transparent atlas',len(data),digest,transparent,partial)
          PY
      - name: Remove rejected runtime compositor
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          index=Path('index.html');text=index.read_text(encoding='utf-8').replace('  <script src="src/anime-sprite-cleanup-v18.js"></script>\n','');index.write_text(text,encoding='utf-8')
          build_path=Path('build-manifest.json');build=json.loads(build_path.read_text(encoding='utf-8'));build['files']=[p for p in build['files'] if p!='src/anime-sprite-cleanup-v18.js'];build_path.write_text(json.dumps(build,indent=2)+'\n',encoding='utf-8')
          sw=Path('sw.js');text=sw.read_text(encoding='utf-8').replace("'sakura-crest-v1.8.0-sprite-cleanup'","'sakura-crest-v1.8.0-transparent-atlas'").replace("'./src/anime-sprite-cleanup-v18.js',",'');sw.write_text(text,encoding='utf-8')
          PY
          rm -f src/anime-sprite-cleanup-v18.js
      - name: Install native alpha browser regression
        shell: bash
        run: |
          cat > tests/sprite-transparency-smoke.mjs <<'JS'
          import { chromium } from 'playwright';
          import { mkdir } from 'node:fs/promises';
          const baseURL=process.env.BASE_URL||'http://127.0.0.1:4173';
          await mkdir('test-results',{recursive:true});
          const browser=await chromium.launch({headless:true});
          try{
            const context=await browser.newContext({viewport:{width:1440,height:900},reducedMotion:'reduce'});
            const page=await context.newPage();const failures=[];
            page.on('pageerror',e=>failures.push(`pageerror: ${e.stack||e.message}`));
            page.on('console',m=>{if(m.type()==='error')failures.push(`console.error: ${m.text()}`)});
            page.on('requestfailed',r=>failures.push(`requestfailed: ${r.url()} — ${r.failure()?.errorText||'unknown'}`));
            await page.goto(baseURL,{waitUntil:'networkidle'});
            await page.waitForFunction(()=>document.getElementById('loading')?.classList.contains('hidden')&&game?.mode==='title',null,{timeout:25000});
            const atlas=await page.evaluate(()=>{const image=images.character_atlas;if(!image)return null;const c=document.createElement('canvas');c.width=image.naturalWidth;c.height=image.naturalHeight;const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(image,0,0);const d=x.getImageData(0,0,c.width,c.height).data;let t=0,o=0;for(let i=3;i<d.length;i+=4){if(d[i]<8)t++;if(d[i]>247)o++;}const n=d.length/4;return{width:c.width,height:c.height,transparentRatio:t/n,opaqueRatio:o/n};});
            if(!atlas||atlas.width!==1728||atlas.height!==1024||atlas.transparentRatio<.50)throw new Error(`Transparent atlas invalid: ${JSON.stringify(atlas)}`);
            const box=await page.locator('#game').boundingBox();await page.mouse.click(box.x+800/960*box.width,box.y+155/540*box.height);await page.locator('#creator:not(.hidden)').waitFor({timeout:5000});await page.locator('#nameInput').fill('Sprite QA');await page.locator('#confirmName').click();await page.waitForFunction(()=>game.mode==='play',null,{timeout:5000});
            for(let i=0;i<70;i++){if(await page.evaluate(()=>Boolean(game.dialogue))){await page.keyboard.press('Space');await page.waitForTimeout(80);}else{await page.waitForTimeout(120);if(!await page.evaluate(()=>Boolean(game.dialogue)))break;}}
            await page.waitForTimeout(500);
            const health=await page.locator('#game').evaluate(canvas=>{const actors=[...game.npcs,...game.teachers,game.player].map(a=>({x:Math.round(a.x-game.camera.x-31),y:Math.round(a.y-game.camera.y-86)})).filter(a=>a.x>-62&&a.x<VIEW_W&&a.y>-86&&a.y<H);const x=canvas.getContext('2d',{willReadFrequently:true});const samples=[];for(const a of actors){const sx=Math.max(0,a.x),sy=Math.max(0,a.y),w=Math.min(62,canvas.width-sx),h=Math.min(86,canvas.height-sy);if(w<30||h<40)continue;const d=x.getImageData(sx,sy,w,h).data;let black=0,color=0;for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2];if(r<18&&g<18&&b<18)black++;if(Math.max(r,g,b)-Math.min(r,g,b)>18)color++;}const n=d.length/4;samples.push({black:black/n,color:color/n});}return{actors:actors.length,samples,maxBlack:Math.max(0,...samples.map(s=>s.black)),avgColor:samples.reduce((v,s)=>v+s.color,0)/Math.max(1,samples.length)};});
            if(health.actors<4||health.samples.length<4||health.maxBlack>.48||health.avgColor<.12)throw new Error(`Actor rendering failed: ${JSON.stringify(health)}`);
            await page.screenshot({path:'test-results/sprite-transparency-desktop.png',fullPage:true});
            if(failures.length)throw new Error(failures.join('\n'));
            console.log('Transparent anime actors passed',JSON.stringify({atlas,health}));await context.close();
          }finally{await browser.close();}
          JS
      - name: Commit corrected local artwork
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/materialize-transparent-atlas-v18.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Materialize transparent anime character frames'
          git push origin HEAD:asset-cleanup-v18
