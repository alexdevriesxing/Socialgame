name: Diagnose transparent character atlas v1.8

on:
  push:
    branches:
      - asset-transfer-v18
  pull_request:
    branches:
      - agent/anime-art-integration-v18

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: asset-transfer-v18
          fetch-depth: 0
      - name: Measure corner-connected background removal
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pillow
          mkdir -p atlas-proof
          python3 - <<'PY'
          from PIL import Image
          from collections import deque
          from pathlib import Path
          import json, statistics
          source=Image.open('assets/anime/characters.webp').convert('RGBA'); source.load()
          FW,FH=48,64
          result={}
          for threshold in (12,18,24,30,36,44,54):
              output=Image.new('RGBA',source.size,(0,0,0,0)); stats=[]
              for row in range(source.height//FH):
                  for col in range(source.width//FW):
                      frame=source.crop((col*FW,row*FH,(col+1)*FW,(row+1)*FH)).convert('RGBA');px=frame.load()
                      corners=[px[x,y][:3] for x,y in ((0,0),(FW-1,0),(0,FH-1),(FW-1,FH-1))]
                      bg=tuple(int(statistics.median(c[i] for c in corners)) for i in range(3))
                      q=deque([(x,0) for x in range(FW)]+[(x,FH-1) for x in range(FW)]+[(0,y) for y in range(FH)]+[(FW-1,y) for y in range(FH)])
                      seen=set();removed=0
                      while q:
                          x,y=q.popleft()
                          if (x,y) in seen:continue
                          seen.add((x,y));r,g,b,a=px[x,y]
                          d=abs(r-bg[0])+abs(g-bg[1])+abs(b-bg[2])
                          if a==0 or d>threshold:continue
                          px[x,y]=(r,g,b,0);removed+=1
                          if x:q.append((x-1,y))
                          if x+1<FW:q.append((x+1,y))
                          if y:q.append((x,y-1))
                          if y+1<FH:q.append((x,y+1))
                      alpha=frame.getchannel('A');opaque=sum(v>16 for v in alpha.getdata())
                      stats.append({'opaque':opaque,'removed':removed,'bbox':alpha.getbbox()})
                      output.alpha_composite(frame,(col*FW,row*FH))
              alpha=list(output.getchannel('A').getdata());ratio=sum(v<8 for v in alpha)/(output.width*output.height)
              result[str(threshold)]={'ratio':ratio,'minOpaque':min(s['opaque'] for s in stats),'maxOpaque':max(s['opaque'] for s in stats),'medianOpaque':statistics.median(s['opaque'] for s in stats),'minRemoved':min(s['removed'] for s in stats),'maxRemoved':max(s['removed'] for s in stats),'medianRemoved':statistics.median(s['removed'] for s in stats)}
              output.resize((864,512),Image.Resampling.NEAREST).save(f'atlas-proof/threshold-{threshold}.png')
          Path('atlas-proof/diagnostics.json').write_text(json.dumps(result,indent=2))
          print(json.dumps(result,indent=2))
          PY
      - name: Upload threshold previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-threshold-diagnostics
          path: atlas-proof
          if-no-files-found: error
          retention-days: 3
