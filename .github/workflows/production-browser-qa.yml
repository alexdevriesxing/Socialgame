name: Production browser QA

on:
  push:
    branches:
      - 'agent/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout release
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare QA output
        run: mkdir -p test-results

      - name: Syntax-check production and QA scripts
        run: |
          set -euo pipefail
          mapfile -t scripts < <(grep -oP '<script src="\K[^"]+' index.html)
          for script in "${scripts[@]}"; do
            node --check "$script"
          done
          node --check sw.js
          node --check tests/browser-production-smoke.mjs
          node --check tests/browser-engine-smoke.mjs
          node --check tests/release-readiness-smoke.mjs
          node --check tests/remote-static-smoke.mjs
          node --check tests/verify-release.mjs

      - name: Validate v1.7 release inventory and Cloudflare artifact
        run: |
          set -o pipefail
          node tests/verify-release.mjs 2>&1 | tee test-results/release-inventory.log

      - name: Validate complete runtime integration
        run: |
          set -o pipefail
          node tests/remote-static-smoke.mjs 2>&1 | tee test-results/runtime-smoke.log

      - name: Simulate full campaigns saves endings and long sessions
        run: |
          set -o pipefail
          node tests/release-readiness-smoke.mjs 2>&1 | tee test-results/release-readiness.log

      - name: Install pinned Playwright and browser engines
        run: |
          npm install --no-save --no-package-lock playwright@1.55.0
          npx playwright install --with-deps chromium firefox webkit
          npx playwright install chrome msedge

      - name: Start static server
        run: |
          python3 -m http.server 4173 > /tmp/sakura-http.log 2>&1 &
          echo $! > /tmp/sakura-http.pid
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/index.html > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/sakura-http.log
          exit 1

      - name: Run complete Chromium visual mobile recovery and offline QA
        env:
          BASE_URL: http://127.0.0.1:4173
        run: |
          set -o pipefail
          node tests/browser-production-smoke.mjs 2>&1 | tee test-results/browser-production-smoke.log

      - name: Run Chrome Edge Firefox and WebKit compatibility QA
        env:
          BASE_URL: http://127.0.0.1:4173
        run: |
          set -o pipefail
          node tests/browser-engine-smoke.mjs 2>&1 | tee test-results/browser-engine-smoke.log

      - name: Upload v1.7 release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sakura-crest-v17-release-readiness-qa
          path: test-results
          if-no-files-found: warn
          retention-days: 14